---
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "10 20 * * 4" # Thursdays 20:10 UTC

# Deny-all at top level; per-job permissions re-grant exactly what's needed.
# A new job added later without thinking won't accidentally inherit broad
# perms.
permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  # Don't cancel an in-flight scan — partial security results are worse
  # than slightly-delayed full ones.
  cancel-in-progress: false

jobs:
  analyze:
    name: Analyze (Python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.35.4
        with:
          languages: python
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4.35.4
        with:
          category: "/language:python"
