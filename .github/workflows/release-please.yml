---
name: release-please

on:
  push:
    branches: [main]

# Deny all GITHUB_TOKEN permissions at top level; per-job permissions
# re-grant only what's needed. Mutating release work uses the GitHub App
# token minted inside each job, not the default GITHUB_TOKEN.
permissions: {}

concurrency:
  # Serialize per-ref runs. Rapid push sequences on main (which we hit
  # during the doxa-research rename session) can fire multiple
  # release-please runs that step on each other when updating the
  # Release PR. Don't cancel in-flight runs — release-please's PR-update
  # is incremental and a cancelled half-update can leave the PR
  # inconsistent.
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # actual write goes via App token below
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token from a GitHub App so the tag
      # push created by release-please retriggers publish.yml. The default
      # GITHUB_TOKEN cannot retrigger other push-triggered workflows. See
      # RELEASE.md → "GitHub App setup for release-please" for one-time
      # configuration (App ID as repo variable, private key as secret).
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When release-please tags a release, pyproject.toml's version is bumped
  # but uv.lock's recorded self-version still points at the previous one.
  # uv regenerates uv.lock from pyproject (not the other way around), so the
  # only way to bump uv.lock is to run `uv lock` after the bump. This job
  # does that and pushes the result as a chore(release) commit. Since chore
  # is hidden in release-please-config.json's changelog-sections, this
  # follow-up commit does NOT trigger another Release PR — it just lands
  # and CI runs on it like any other push.
  #
  # Pushes use the App token (same as release-please) so the commit can
  # retrigger CI; the default GITHUB_TOKEN would not.
  sync-uv-lock:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read  # explicit; actual write goes via App token below
    steps:
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Regenerate uv.lock from pyproject
        run: uv lock

      - name: Commit uv.lock if it changed
        env:
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          if git diff --quiet uv.lock; then
            echo "uv.lock already in sync with pyproject; nothing to commit."
            exit 0
          fi
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git config user.name "${APP_SLUG}[bot]"
          git add uv.lock
          git commit -m "chore(release): sync uv.lock for $TAG_NAME"
          git push origin main
