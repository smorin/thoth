---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
      - name: ruff format check
        run: uv run ruff format --check src/thoth/
      - name: ruff lint
        run: uv run ruff check src/thoth/

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
      - name: ty check
        run: uv run ty check src/thoth/

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - name: yamllint
        run: uvx yamllint -c .yamllint .

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: actionlint
        run: |
          bash <(curl -Ls https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color

  codespell:
    name: Codespell
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Run codespell
        run: >
          uvx codespell
          --skip=".git,.venv,htmlcov,uv.lock,requirements.txt,archive,planning,research"
          --ignore-words-list="thoth,perplexity,sonar,pplx,openai,hel"
          .

  bandit:
    name: Bandit Security Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Run bandit
        run: uvx bandit -r src/ -ll

  file-hygiene:
    name: File Hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - name: Run editorconfig-checker
        run: uvx --from editorconfig-checker ec
      - name: Check for large files
        run: |
          max_kb=500
          failed=0
          while IFS= read -r -d '' f; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              if [ "$size" -gt $((max_kb * 1024)) ]; then
                echo "::error file=$f::File is too large ($(( size / 1024 )) KB > ${max_kb} KB)"
                failed=1
              fi
            fi
          done < <(git ls-files -z)
          exit $failed

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Make scripts executable
        run: chmod +x thoth thoth_test
      - name: Run tests (mock provider only)
        env:
          MOCK_API_KEY: ci-test-key
        run: ./thoth_test -r --provider mock --skip-interactive
