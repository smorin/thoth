---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: ruff format check
        run: uv run ruff format --check src/thoth/
      - name: ruff lint
        run: uv run ruff check src/thoth/

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: ty check
        run: uv run ty check src/thoth/

  hygiene:
    name: Hygiene (yamllint, codespell, bandit, files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
      - name: yamllint
        run: uvx yamllint -c .yamllint .
      - name: codespell
        run: >
          uvx codespell
          --skip=".git,.venv,htmlcov,uv.lock,bun.lock,requirements.txt,archive,planning,research"
          --ignore-words-list="thoth,perplexity,sonar,pplx,openai,hel"
          .
      - name: bandit
        run: uvx bandit -r src/ -ll
      - name: editorconfig-checker
        run: uvx --from editorconfig-checker ec
      - name: Check for large files
        run: |
          max_kb=500
          failed=0
          while IFS= read -r -d '' f; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              if [ "$size" -gt $((max_kb * 1024)) ]; then
                echo "::error file=$f::File is too large ($(( size / 1024 )) KB > ${max_kb} KB)"
                failed=1
              fi
            fi
          done < <(git ls-files -z)
          exit $failed

  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: reviewdog/action-actionlint@v1.72.0
        with:
          reporter: github-check
          fail_level: error

  trufflehog:
    name: TruffleHog Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 2 || 0 }}
      - name: Scan for verified secrets
        uses: trufflesecurity/trufflehog@v3.95.2
        with:
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --results=verified,unknown

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Run tests (mock provider only)
        env:
          MOCK_API_KEY: ci-test-key
        run: ./thoth_test -r --provider mock --skip-interactive -j auto
