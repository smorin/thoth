---
# P20: weekly real-API workflow regression tests.
#
# Runs `pytest -m live_api` against live OpenAI to detect drift in
# user-visible CLI behaviors (streaming, file output, append,
# no-metadata, secret masking, mismatch defense). Sibling to
# extended.yml (which checks model-kind contracts nightly).
#
# Gated on OPENAI_API_KEY being set as a repo secret. The job is
# informational — failures notify the team but do NOT block PR merges.
#
# Security note: this workflow does not use any github.event.* untrusted
# inputs in run: commands; only secrets.OPENAI_API_KEY (passed via env).

name: Live-API Workflow Tests (weekly)

"on":
  schedule:
    - cron: "0 2 * * 0"   # Sunday 02:00 UTC = Saturday 7pm PDT (6pm PST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live_api:
    name: pytest -m live_api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run live-API workflow tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run pytest -m live_api -v
        continue-on-error: true
