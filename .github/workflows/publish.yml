name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

# Deny-all at top level; per-job permissions re-grant exactly what's needed.
# This is the most security-sensitive workflow in the repo (it talks to PyPI),
# so any new step or job added later requires an explicit grant.
permissions: {}

concurrency:
  # Serialize publish runs per tag. If a tag is ever re-pushed (delete + recreate),
  # the second run waits for the first to finish instead of racing it.
  group: publish-${{ github.ref }}
  # NEVER cancel an in-flight publish — a mid-upload abort can leave half-uploaded
  # state on PyPI (rare but the registries lock filenames on first byte).
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Need full history so the "tag is on main" check below can compute
          # reachability via `git merge-base --is-ancestor`.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Verify tag is on main
        # Defense in depth: a tag can point at ANY commit in the repo, including
        # one on a feature branch that was never merged to main. Without this
        # check, an attacker who can push a `v*` tag (e.g., via a compromised
        # collaborator token) could trigger a release from off-main code.
        # The `pypi` environment's required-reviewer rule is the final gate,
        # but this check prevents the workflow from even starting.
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is not reachable from origin/main."
            echo "Releases must be tagged on commits that have been merged to main."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is reachable from origin/main; proceeding."

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag version matches package version: $PKG_VERSION"

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        run: >-
          uv publish --trusted-publishing always
          --publish-url https://test.pypi.org/legacy/
          --check-url https://test.pypi.org/simple/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
