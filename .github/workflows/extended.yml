---
# P18 Phase I: nightly real-API contract tests.
#
# Runs `pytest -m "extended and not extended_slow"` which exercises every entry in KNOWN_MODELS
# against live provider APIs to detect drift between doxa-research's declared
# `kind` and what the upstream API actually does. Gated on provider API-key
# repo secrets. The job is informational — failures notify the team but do
# NOT block PR merges.

name: Extended Contract Tests (nightly)

"on":
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: extended
  # Don't cancel an in-flight nightly — half-finished real-API runs pollute
  # the test report and burn API quota for no gain.
  cancel-in-progress: false

jobs:
  extended:
    name: pytest -m "extended and not extended_slow"
    runs-on: ubuntu-latest
    # Only run live-provider scheduled/manual jobs in the canonical repo.
    # Forks do not receive upstream secrets, and these tests can spend
    # provider quota.
    if: github.repository == 'smorin/doxa-research'
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.11"
          enable-cache: true
      - name: Run extended contract tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run pytest -m "extended and not extended_slow" -v
        continue-on-error: true
