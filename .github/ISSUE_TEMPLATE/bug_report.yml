name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: "1. Run `thoth ...`\n2. ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Thoth version
      placeholder: "e.g. 2.5.0"

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11"
