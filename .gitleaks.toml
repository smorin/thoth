title = "thoth gitleaks config"

# Extend the upstream default rules; add allowlists below for documented false positives.
[extend]
useDefault = true

[[allowlists]]
description = "Global allowlist for documentation, archives, and known placeholders"

paths = [
  '''(^|/)archive/''',
  '''(^|/)planning/''',
  '''(^|/)research/''',
  '''(^|/)tests/fixtures/''',
  '''\.gitleaks\.toml$''',
]

regexes = [
  '''YOUR_[A-Z0-9_]+_KEY''',
  '''YOUR_API_KEY''',
  '''xxxxxxxx+''',
  '''sk-[xX]{8,}''',
  '''AIza[xX]{8,}''',
  '''pplx-[xX]{8,}''',
  '''ci-test-key''',
]

# Fixture-unique substrings only. Generic tokens like "mock" / "example" /
# "placeholder" were too broad globally — they now live in the tests/-scoped
# allowlist below, anchored to realistic shapes.
stopwords = [
  "abcdef",
  "invalid-key",
  "secret-key-12345",
]

[[allowlists]]
description = "Test-file placeholder/mock/example tokens (narrowed from global stopwords)"

paths = ['''(^|/)tests/''']

regexes = [
  '''(?i)(mock|example|placeholder|test)[-_]?(api[-_]?)?(key|token|secret)''',
]
